<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>5000英文單字學習</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--surface:#1a1a24;--card:#22222f;--border:#2e2e3f;--accent:#7c6af7;--accent2:#e06c8a;--text:#e8e8f0;--muted:#8888a0;--tag-bg:#2a2a3d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{background:linear-gradient(135deg,#1a1a30,#0f0f1a);border-bottom:1px solid var(--border);padding:24px 24px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
header h1{font-family:'Playfair Display',serif;font-size:1.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.word-count{background:var(--tag-bg);color:var(--accent);font-size:0.72rem;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:160px;position:relative;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;opacity:0.4;}
input[type=search]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 34px;color:var(--text);font-size:0.9rem;outline:none;-webkit-appearance:none;}
input[type=search]:focus{border-color:var(--accent);}
input[type=search]::placeholder{color:var(--muted);}
.sort-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:9px 14px;font-size:0.82rem;cursor:pointer;white-space:nowrap;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,.1);}
.alpha-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px;}
.alpha-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);width:28px;height:28px;font-size:0.75rem;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.alpha-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.alpha-btn.all{width:auto;padding:0 9px;font-size:0.72rem;}
.stats-bar{padding:10px 24px;color:var(--muted);font-size:0.8rem;border-bottom:1px solid var(--border);background:var(--bg);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;padding:16px 24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.word{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);line-height:1.2;}
.speak-btn{background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.25);border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--accent);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s;}
.speak-btn.playing{background:var(--accent);color:#fff;animation:pulse .6s ease-in-out infinite alternate;}
.speak-btn.loading{opacity:0.5;}
@keyframes pulse{from{box-shadow:0 0 0 0 rgba(124,106,247,.5);}to{box-shadow:0 0 0 6px rgba(124,106,247,0);}}
.pos-tag{display:inline-block;background:var(--tag-bg);color:var(--accent2);font-size:0.7rem;font-weight:500;padding:2px 7px;border-radius:4px;margin-bottom:5px;}
.zh-def{color:var(--muted);font-size:0.86rem;line-height:1.5;}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:20px 24px;flex-wrap:wrap;}
.page-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 13px;font-size:0.82rem;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.page-btn:disabled{opacity:0.3;}
.page-info{color:var(--muted);font-size:0.82rem;padding:0 6px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
@media(max-width:480px){
  header{padding:16px 16px 12px;}.grid{padding:12px 16px;gap:8px;}
  .stats-bar{padding:8px 16px;}.pagination{padding:14px 16px;}header h1{font-size:1.3rem;}
}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>📚 5000英文單字</h1>

  <div class="controls">

      <input type="search" id="searchInput" placeholder="搜尋英文單字或中文解釋...">
    </div>
    <button class="sort-btn active" id="sortAZ" onclick="setSort('az')">A → Z</button>
    <button class="sort-btn" id="sortZA" onclick="setSort('za')">Z → A</button>

  <div class="alpha-bar" id="alphaBar"></div>
</header>
<div class="stats-bar" id="statsBar">共 2,778 個單字</div>
<div id="audioTest" style="text-align:center;padding:6px;background:#2a1f5e;font-size:13px;color:#aaa;">
  點這裡測試語音 →

  <span id="audioTestMsg"></span>
</div>
<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

w","pos":"v.","zh":"縮回；撤退；提款；取"},{"word":"wither","pos":"v.","zh":"枯萎；凋謝"},{"word":"withhold","pos":"v.","zh":"保留；抑制"},{"word":"witness","pos":"n.","zh":"目擊者；證詞；證據"},{"word":"woe","pos":"n.","zh":"悲傷；悲哀她滿臉皺紋，一副悲傷的表情。"},{"word":"wonder","pos":"n.","zh":"奇觀；驚嘆；奇才"},{"word":"wooden","pos":"adj.","zh":"木製的；呆板的這所房子被一道高高的木製籬笆圍了起來。"},{"word":"woodpecker","pos":"n.","zh":"啄木鳥啄木鳥在樹上啄洞。"},{"word":"workout","pos":"n.","zh":"鍛煉；訓練"},{"word":"workshop","pos":"n.","zh":"車間；廠房；作坊；研這個機構組織關於應對壓力問題的研討會。"},{"word":"worship","pos":"v.","zh":"崇拜在這個島上，人們信仰不同的神。"},{"word":"worth","pos":"prep.","zh":"值得"},{"word":"wound","pos":"n.","zh":"創傷；傷口他死於頸部和上半身的多處刺傷。"},{"word":"wrap","pos":"n.","zh":"圍巾；包裹"},{"word":"wrestle","pos":"v.","zh":"與摔跤；角力；將他從事職業摔跤已有五年了。"},{"word":"wrinkle","pos":"n.","zh":"皺紋；皺褶這位老女人的臉充滿了皺紋。"},{"word":"wrist","pos":"n.","zh":"腕我打網球時扭傷了手腕。"},{"word":"yacht","pos":"n.","zh":"帆船；快艇；遊艇游艇在海上順風行駛。"},{"word":"yearn","pos":"v.","zh":"渴望；思念"},{"word":"yield","pos":"v.","zh":"出產；屈服；讓步"},{"word":"yoga","pos":"n.","zh":"瑜伽她對瑜珈和園藝很著迷。"},{"word":"yogurt","pos":"n.","zh":"優酪乳；乳酪我午餐只喝了一罐酸乳。"},{"word":"youngster","pos":"n.","zh":"年輕人；少年該方案適用於年齡介乎至歲之間的少年兒童。"},{"word":"youth","pos":"n.","zh":"青春"},{"word":"zip","pos":"n.","zh":"尖嘯聲；活力"},{"word":"zone","pos":"n.","zh":"地帶；地區他被指控在限速英里的區域內駕車時速達到英里。"},{"word":"zoo","pos":"n.","zh":"動物園她的父親承諾帶他去動物園。"},{"word":"zoom","pos":"v.","zh":"飛機突然上升；大大這架戰鬥機突然上升並且嚇到所有的士兵們。"}];
const PER_PAGE=60;
let filtered=[...WORDS],currentPage=1,currentLetter='',currentSort='az',searchQ='';
let currentBtn=null;
const player=document.getElementById('player');

/* ── 音訊快取：避免重複 fetch 同一個單字 ── */
const audioCache={};

/* ── 發音系統 ──
   第一次點擊：speechSynthesis（同步，iOS無限制），同時背景抓 MP3 快取
   第二次點擊：直接播快取的真人 MP3（同步設 src，不需 await）
── */
function speak(word, btn){
  /* 再點同一個 → 停止 */
  if(currentBtn===btn){
    player.pause(); player.src='';
    speechSynthesis.cancel();
    btn.classList.remove('playing');
    currentBtn=null;
    return;
  }
  /* 停止前一個 */
  player.pause();
  speechSynthesis.cancel();
  if(currentBtn) currentBtn.classList.remove('playing');
  currentBtn=btn;
  btn.classList.add('playing');

  /* 有快取 MP3 → 直接在 gesture 同步流程裡播放（iOS 允許）*/
  if(audioCache[word]){
    player.src=audioCache[word];
    player.load();
    player.play().catch(()=>tts(word,btn));
    player.onended=()=>{btn.classList.remove('playing');if(currentBtn===btn)currentBtn=null;};
    player.onerror=()=>tts(word,btn);
    return;
  }

  /* 無快取 → 立刻用 TTS 發音（完全同步，手機/電腦都能用），並在背景抓 MP3 */
  tts(word, btn);
  fetchMP3(word);
}

function tts(word, btn){
  if(!('speechSynthesis' in window)){btn.classList.remove('playing');currentBtn=null;return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.lang='en-US'; u.rate=0.85;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));
  if(v) u.voice=v;
  u.onend=()=>{btn.classList.remove('playing');if(currentBtn===btn)currentBtn=null;};
  u.onerror=()=>{btn.classList.remove('playing');if(currentBtn===btn)currentBtn=null;};
  speechSynthesis.speak(u);
}

async function fetchMP3(word){
  if(audioCache[word]) return;
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    const data=await res.json();
    for(const entry of data){
      for(const ph of(entry.phonetics||[])){
        if(ph.audio&&ph.audio.includes('.mp3')){
          audioCache[word]=ph.audio.startsWith('http')?ph.audio:'https:'+ph.audio;
          return;
        }
      }
    }
  }catch(e){}
}

function testSpeak(){
  const msg=document.getElementById('audioTestMsg');
  if(!('speechSynthesis' in window)){
    msg.textContent=' ❌ 此瀏覽器不支援語音';
    return;
  }
  msg.textContent=' ⏳ 播放中...';
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance('hello');
  u.lang='en-US'; u.rate=0.9;
  u.onstart=()=>{ msg.textContent=' ✅ 語音正常！'; };
  u.onend=()=>{ setTimeout(()=>{ msg.textContent=''; }, 2000); };
  u.onerror=(e)=>{ msg.textContent=' ❌ 錯誤：'+e.error; };
  speechSynthesis.speak(u);
}

/* ── Alpha bar ── */
const letters=[...new Set(WORDS.map(w=>w.word[0].toUpperCase()))].sort();
const alphaBar=document.getElementById('alphaBar');
const allBtn=document.createElement('button');
allBtn.className='alpha-btn all active';allBtn.textContent='全部';
allBtn.onclick=()=>setLetter('');
alphaBar.appendChild(allBtn);
letters.forEach(l=>{
  const b=document.createElement('button');b.className='alpha-btn';b.textContent=l;
  b.onclick=()=>setLetter(l);alphaBar.appendChild(b);
});
document.getElementById('totalCount').textContent=`共 ${WORDS.length.toLocaleString()} 個單字`;

function setLetter(l){
  currentLetter=l;currentPage=1;
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.toggle('active',
    (l===''&&b.classList.contains('all'))||(l!==''&&b.textContent===l&&!b.classList.contains('all'))));
  update();
}
function setSort(s){
  currentSort=s;currentPage=1;
  document.getElementById('sortAZ').classList.toggle('active',s==='az');
  document.getElementById('sortZA').classList.toggle('active',s==='za');
  update();
}
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQ=e.target.value.trim().toLowerCase();currentPage=1;currentLetter='';
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.alpha-btn.all').classList.add('active');
  update();
});

function update(){
  let list=[...WORDS];
  if(currentLetter)list=list.filter(w=>w.word[0].toUpperCase()===currentLetter);
  if(searchQ)list=list.filter(w=>w.word.toLowerCase().includes(searchQ)||(w.zh&&w.zh.includes(searchQ)));
  list.sort((a,b)=>currentSort==='az'?a.word.localeCompare(b.word):b.word.localeCompare(a.word));
  filtered=list;
  const total=list.length,pages=Math.ceil(total/PER_PAGE);
  if(currentPage>pages)currentPage=1;
  document.getElementById('statsBar').textContent=
    searchQ?`搜尋「${searchQ}」：找到 ${total} 個單字`
    :currentLetter?`字母 ${currentLetter}：共 ${total} 個單字`
    :`共 ${total} 個單字`;
  const page=list.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);
  const grid=document.getElementById('grid');
  if(!page.length){
    grid.innerHTML='<div class="empty"><h3>找不到符合的單字</h3></div>';
  }else{
    grid.innerHTML=page.map(w=>`
      <div class="card">
        <div class="card-top">
          <div class="word">${w.word}</div>
          <button class="speak-btn" data-word="${w.word}" onclick="speak(this.dataset.word,this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
        </div>
        ${w.pos?`<span class="pos-tag">${w.pos}</span>`:''}
        ${w.zh?`<div class="zh-def">${w.zh}</div>`:''}
      </div>`).join('');
  }
  renderPagination(pages);
}

function renderPagination(pages){
  const p=document.getElementById('pagination');
  if(pages<=1){p.innerHTML='';return;}
  let html=`<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})">‹ 上頁</button>`;
  let s=Math.max(1,currentPage-2),e=Math.min(pages,currentPage+2);
  if(currentPage<=3)e=Math.min(5,pages);
  if(currentPage>=pages-2)s=Math.max(1,pages-4);
  if(s>1){html+=`<button class="page-btn" onclick="goPage(1)">1</button>`;if(s>2)html+=`<span class="page-info">…</span>`;}
  for(let i=s;i<=e;i++)html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<pages){if(e<pages-1)html+=`<span class="page-info">…</span>`;html+=`<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;}
  html+=`<button class="page-btn" ${currentPage===pages?'disabled':''} onclick="goPage(${currentPage+1})">下頁 ›</button>`;
  html+=`<span class="page-info">${currentPage} / ${pages} 頁</span>`;
  p.innerHTML=html;
}
function goPage(n){currentPage=n;window.scrollTo({top:0,behavior:'smooth'});update();}
update();
</script>
