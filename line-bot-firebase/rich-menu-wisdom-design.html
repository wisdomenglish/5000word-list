<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 2500px;
    height: 843px;
    background: linear-gradient(135deg, #1A1B2E 0%, #16213E 100%);
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    gap: 2px;
    background: #0F1621;
  }

  .row {
    display: flex;
    flex: 1;
    gap: 2px;
  }

  .cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(124,106,247,0.15) 0%, rgba(31,33,62,0.3) 100%);
    gap: 16px;
    padding-bottom: 36px;
    position: relative;
    overflow: hidden;
  }

  /* 左上角裝飾點 */
  .cell::before {
    content: '';
    position: absolute;
    top: 22px;
    left: 22px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #7C6AF7;
    opacity: 0.6;
  }

  .icon-wrap {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid #7C6AF7;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(124,106,247,0.08);
  }

  .icon-wrap svg {
    width: 55px;
    height: 55px;
  }

  .label {
    font-size: 58px;
    font-weight: 700;
    color: #F0F4F8;
    letter-spacing: 8px;
  }

  /* 四字詞縮小字間距避免與三字詞寬度落差過大 */
  .label-long {
    letter-spacing: 4px;
  }

  .sub {
    font-size: 26px;
    color: #9b8bf0;
    letter-spacing: 2px;
    font-weight: 400;
  }

  /* 底部紫線 */
  .cell::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #7C6AF7, transparent);
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- 上排：文法提問、單字查詢 -->
  <div class="row">

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      <div class="label">文法提問</div>
      <div class="sub">Grammar Q&A</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5h16M6.5 4h11m0 0l2 4m-2-4l-2 4M7.5 10h9l1 6H6.5l1-6z"/>
        </svg>
      </div>
      <div class="label">單字查詢</div>
      <div class="sub">Vocabulary</div>
    </div>

  </div>

  <!-- 下排：作文批改、初階改寫、進階改寫 -->
  <div class="row">

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M12 17v-4M8 15h8"/>
        </svg>
      </div>
      <div class="label">作文批改</div>
      <div class="sub">Essay Review</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <div class="label label-long">初階改寫</div>
      <div class="sub">Basic Rewrite</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C6AF7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M3 21v-5h5"/>
        </svg>
      </div>
      <div class="label label-long">進階改寫</div>
      <div class="sub">Advanced Rewrite</div>
    </div>

  </div>

</div>
</body>
</html>
