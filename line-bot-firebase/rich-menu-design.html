<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 2500px;
    height: 843px;
    background: #1A1914;
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    gap: 2px;
    background: #2A2820;
  }

  .row {
    display: flex;
    flex: 1;
    gap: 2px;
  }

  .cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1A1914;
    gap: 16px;
    padding-bottom: 36px;
    position: relative;
    overflow: hidden;
  }

  /* 左上角裝飾點 */
  .cell::before {
    content: '';
    position: absolute;
    top: 22px;
    left: 22px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #C8A96E;
    opacity: 0.6;
  }

  .icon-wrap {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid #C8A96E;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(200, 169, 110, 0.08);
  }

  .icon-wrap svg {
    width: 55px;
    height: 55px;
  }

  .label {
    font-size: 58px;
    font-weight: 700;
    color: #F0EAD8;
    letter-spacing: 8px;
  }

  /* 四字詞縮小字間距避免與三字詞寬度落差過大 */
  .label-long {
    letter-spacing: 4px;
  }

  .sub {
    font-size: 26px;
    color: #C8A96E;
    letter-spacing: 2px;
    font-weight: 400;
  }

  /* 底部金線 */
  .cell::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #C8A96E, transparent);
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- 上排：行事曆、印刷單 -->
  <div class="row">

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="label">行事曆</div>
      <div class="sub">Schedule</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </div>
      <div class="label">印刷單</div>
      <div class="sub">Print Order</div>
    </div>

  </div>

  <!-- 下排：請假單、資料提取、公告區 -->
  <div class="row">

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <div class="label">請假單</div>
      <div class="sub">Leave Request</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
      </div>
      <div class="label label-long">資料提取</div>
      <div class="sub">Data Retrieval</div>
    </div>

    <div class="cell">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5L6 9H2v6h4l5 4V5z"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </div>
      <div class="label">公告區</div>
      <div class="sub">Bulletin</div>
    </div>

  </div>

</div>
</body>
</html>
