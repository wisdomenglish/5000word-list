<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Hero English Logo — Wisdom Style</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #E8E8EC;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 64px;
  flex-wrap: wrap;
  padding: 80px 48px;
  font-family: Inter, sans-serif;
}
.wrapper { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.label {
  font-size: 10px;
  letter-spacing: 3px;
  color: #aaa;
  text-transform: uppercase;
}
.card {
  background: #fff;
  padding: 64px 56px;
  border-radius: 24px;
  box-shadow: 0 12px 60px rgba(0,0,0,0.09);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card.dark { background: #0D0D1A; }
.card.mono { background: #FAFAFA; }
</style>
</head>
<body>

<!--
  Design concept: adapt the Wisdom English logo (W+M overlapping letterforms) to Hero English.
  - Large H (dominant, filled) = the "M" equivalent
  - E letterform (receding, partial) = the "W" equivalent — peeks from left, threads through H's gaps
  - Same Cinzel serif typography, same dot-under-Chinese treatment
  - Three versions: Mono / Color Light / Color Dark
-->

<!-- ════ MONO ════ -->
<div class="wrapper">
<div class="card mono">
<svg width="320" height="480" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">

  <!-- E letterform: background layer (light silver, receding) -->
  <!-- Spine -->
  <rect x="34" y="40" width="16" height="202" fill="#C4C4C4"/>
  <!-- Top bar (full width — center section visible between H's legs above crossbar) -->
  <rect x="34" y="40" width="242" height="16" fill="#C4C4C4"/>
  <!-- Mid bar (full width — center hidden by H crossbar; only left + right stubs visible) -->
  <rect x="34" y="131" width="242" height="16" fill="#C4C4C4"/>
  <!-- Bottom bar (full width — center section visible between H's legs below crossbar) -->
  <rect x="34" y="226" width="242" height="16" fill="#C4C4C4"/>

  <!-- H letterform: foreground (near-black, dominant) -->
  <rect x="72" y="25" width="46" height="230" fill="#1A1B2E"/>
  <rect x="202" y="25" width="46" height="230" fill="#1A1B2E"/>
  <rect x="72" y="116" width="176" height="38" fill="#1A1B2E"/>

  <!-- HERO -->
  <text x="160" y="316"
        font-family="Cinzel, serif" font-size="56" font-weight="900"
        fill="#1A1B2E" text-anchor="middle" letter-spacing="12">HERO</text>

  <!-- Divider -->
  <line x1="40" y1="335" x2="280" y2="335" stroke="#1A1B2E" stroke-width="0.5" opacity="0.12"/>
  <circle cx="160" cy="335" r="2.5" fill="#1A1B2E" opacity="0.45"/>
  <circle cx="144" cy="335" r="1.5" fill="#1A1B2E" opacity="0.2"/>
  <circle cx="176" cy="335" r="1.5" fill="#1A1B2E" opacity="0.2"/>

  <!-- ENGLISH -->
  <text x="160" y="358"
        font-family="Cinzel, serif" font-size="11.5"
        fill="#6B7280" text-anchor="middle" letter-spacing="10">ENGLISH</text>

  <!-- 英雄英語 -->
  <text x="160" y="416"
        font-family="Inter, sans-serif" font-size="22" font-weight="300"
        fill="#1A1B2E" text-anchor="middle" letter-spacing="9">英雄英語</text>

  <!-- Dots under Chinese characters -->
  <circle cx="116" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="148" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="178" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="208" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>

  <!-- Tagline -->
  <text x="160" y="462"
        font-family="Cinzel, serif" font-size="8"
        fill="#9CA3AF" text-anchor="middle" letter-spacing="5">LEARN · QUEST · MASTER</text>
</svg>
</div>
<div class="label">Mono — 黑白版</div>
</div>

<!-- ════ COLOR LIGHT ════ -->
<div class="wrapper">
<div class="card">
<svg width="320" height="480" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </linearGradient>
    <linearGradient id="hGh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
  </defs>

  <!-- E letterform: background (amber gold, receding) -->
  <rect x="34" y="40" width="16" height="202" fill="#D97706" opacity="0.35"/>
  <rect x="34" y="40" width="242" height="16" fill="#D97706" opacity="0.35"/>
  <rect x="34" y="131" width="242" height="16" fill="#D97706" opacity="0.35"/>
  <rect x="34" y="226" width="242" height="16" fill="#D97706" opacity="0.35"/>

  <!-- H letterform: foreground (purple gradient, dominant) -->
  <rect x="72" y="25" width="46" height="230" fill="url(#hG)"/>
  <rect x="202" y="25" width="46" height="230" fill="url(#hG)"/>
  <rect x="72" y="116" width="176" height="38" fill="url(#hGh)"/>

  <!-- H subtle highlights -->
  <rect x="72"  y="25" width="7" height="230" fill="rgba(255,255,255,0.13)"/>
  <rect x="202" y="25" width="7" height="230" fill="rgba(255,255,255,0.13)"/>
  <rect x="72"  y="25" width="176" height="3"  fill="rgba(255,255,255,0.2)"/>

  <!-- HERO -->
  <text x="160" y="316"
        font-family="Cinzel, serif" font-size="56" font-weight="900"
        fill="#1A1B2E" text-anchor="middle" letter-spacing="12">HERO</text>

  <!-- Divider -->
  <line x1="40" y1="335" x2="280" y2="335" stroke="#1A1B2E" stroke-width="0.5" opacity="0.12"/>
  <circle cx="160" cy="335" r="2.5" fill="#7C3AED"/>
  <circle cx="144" cy="335" r="1.5" fill="#7C3AED" opacity="0.35"/>
  <circle cx="176" cy="335" r="1.5" fill="#7C3AED" opacity="0.35"/>

  <!-- ENGLISH -->
  <text x="160" y="358"
        font-family="Cinzel, serif" font-size="11.5"
        fill="#5B21B6" text-anchor="middle" letter-spacing="10">ENGLISH</text>

  <!-- 英雄英語 -->
  <text x="160" y="416"
        font-family="Inter, sans-serif" font-size="22" font-weight="300"
        fill="#1A1B2E" text-anchor="middle" letter-spacing="9">英雄英語</text>

  <!-- Dots under Chinese characters -->
  <circle cx="116" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="148" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="178" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>
  <circle cx="208" cy="428" r="1.8" fill="#1A1B2E" opacity="0.5"/>

  <!-- Tagline -->
  <text x="160" y="462"
        font-family="Cinzel, serif" font-size="8"
        fill="#9CA3AF" text-anchor="middle" letter-spacing="5">LEARN · QUEST · MASTER</text>
</svg>
</div>
<div class="label">Light — 淺色版</div>
</div>

<!-- ════ COLOR DARK ════ -->
<div class="wrapper">
<div class="card dark">
<svg width="320" height="480" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hGD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="hGDh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glowH" x="-25%" y="-20%" width="150%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowT" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind lettermark -->
  <ellipse cx="155" cy="140" rx="115" ry="145" fill="#6D28D9" opacity="0.07"/>

  <!-- E letterform: background (warm gold, receding) -->
  <rect x="34" y="40" width="16" height="202" fill="#FCD34D" opacity="0.45"/>
  <rect x="34" y="40" width="242" height="16" fill="#FCD34D" opacity="0.45"/>
  <rect x="34" y="131" width="242" height="16" fill="#FCD34D" opacity="0.45"/>
  <rect x="34" y="226" width="242" height="16" fill="#FCD34D" opacity="0.45"/>

  <!-- H letterform: foreground (lighter purple + glow) -->
  <rect x="72" y="25" width="46" height="230" fill="url(#hGD)" filter="url(#glowH)"/>
  <rect x="202" y="25" width="46" height="230" fill="url(#hGD)" filter="url(#glowH)"/>
  <rect x="72" y="116" width="176" height="38" fill="url(#hGDh)" filter="url(#glowH)"/>

  <!-- H subtle highlights -->
  <rect x="72"  y="25" width="7" height="230" fill="rgba(255,255,255,0.1)"/>
  <rect x="202" y="25" width="7" height="230" fill="rgba(255,255,255,0.1)"/>

  <!-- HERO -->
  <text x="160" y="316"
        font-family="Cinzel, serif" font-size="56" font-weight="900"
        fill="#E8E8F0" text-anchor="middle" letter-spacing="12"
        filter="url(#glowT)">HERO</text>

  <!-- Divider -->
  <line x1="40" y1="335" x2="280" y2="335" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <circle cx="160" cy="335" r="2.5" fill="#A78BFA" filter="url(#glowT)"/>
  <circle cx="144" cy="335" r="1.5" fill="#A78BFA" opacity="0.4"/>
  <circle cx="176" cy="335" r="1.5" fill="#A78BFA" opacity="0.4"/>

  <!-- ENGLISH -->
  <text x="160" y="358"
        font-family="Cinzel, serif" font-size="11.5"
        fill="#A78BFA" text-anchor="middle" letter-spacing="10">ENGLISH</text>

  <!-- 英雄英語 -->
  <text x="160" y="416"
        font-family="Inter, sans-serif" font-size="22" font-weight="300"
        fill="rgba(232,232,240,0.85)" text-anchor="middle" letter-spacing="9">英雄英語</text>

  <!-- Dots under Chinese characters -->
  <circle cx="116" cy="428" r="1.8" fill="rgba(167,139,250,0.6)"/>
  <circle cx="148" cy="428" r="1.8" fill="rgba(167,139,250,0.6)"/>
  <circle cx="178" cy="428" r="1.8" fill="rgba(167,139,250,0.6)"/>
  <circle cx="208" cy="428" r="1.8" fill="rgba(167,139,250,0.6)"/>

  <!-- Tagline -->
  <text x="160" y="462"
        font-family="Cinzel, serif" font-size="8"
        fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="5">LEARN · QUEST · MASTER</text>
</svg>
</div>
<div class="label">Dark — 深色版</div>
</div>

</body>
</html>
